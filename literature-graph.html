<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literature Graph – Tree Placement 3DGS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary:   #0a0d14;
  --bg-secondary: #111827;
  --bg-tertiary:  #1e2535;
  --bg-card:      #252d40;
  --border:       #2d3a52;
  --text-primary: #e2e8f0;
  --text-sec:     #94a3b8;
  --text-muted:   #64748b;
  --accent:       #7c3aed;
  --accent-l:     #a78bfa;
  --accent-glow:  rgba(124,58,237,0.3);
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  height: 100vh;
  overflow: hidden;
}
/* ── Sidebar ── */
#sidebar {
  width: 295px; min-width: 295px; height: 100vh;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px 13px;
  display: flex; flex-direction: column; gap: 14px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sb-title {
  font-size: 11px; font-weight: 700; color: var(--accent-l);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
#sb-head h1 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
#sb-head p  { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
/* Search */
#search-wrap { position: relative; }
#search-input {
  width: 100%; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text-primary); font-size: 12px;
  padding: 7px 30px 7px 10px; outline: none;
  transition: border-color 0.2s;
}
#search-input::placeholder { color: var(--text-muted); }
#search-input:focus { border-color: var(--accent); }
.s-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
/* Section buttons */
.sec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.sec-btn {
  border: 1px solid var(--border); background: var(--bg-tertiary);
  border-radius: 5px; padding: 5px 7px; cursor: pointer;
  font-size: 10.5px; color: var(--text-sec); text-align: left;
  transition: all 0.15s; line-height: 1.3;
}
.sec-btn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.sec-btn.active { background: var(--bg-card); color: var(--text-primary); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
.sec-btn.inactive { opacity: 0.4; }
/* Year range */
.rng-wrap { display: flex; flex-direction: column; gap: 5px; }
.rng-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }
.rng-container { position: relative; height: 18px; }
.rng-container input[type=range] {
  position: absolute; width: 100%; height: 4px;
  -webkit-appearance: none; background: transparent;
  pointer-events: none; top: 50%; transform: translateY(-50%);
}
.rng-container input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); cursor: pointer; pointer-events: all;
  box-shadow: 0 0 0 2px var(--bg-secondary);
}
.rng-track { position: absolute; top: 50%; transform: translateY(-50%); height: 4px; width: 100%; background: var(--bg-tertiary); border-radius: 2px; }
.rng-fill  { position: absolute; top: 50%; transform: translateY(-50%); height: 4px; background: var(--accent); border-radius: 2px; pointer-events: none; }
/* Relevance filter */
.rel-row { display: flex; gap: 4px; }
.rel-btn {
  flex: 1; padding: 5px 2px; font-size: 11px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text-muted); cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.rel-btn.active { background: var(--bg-card); border-color: var(--accent); color: var(--accent-l); }
/* Toggle */
.tog-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-sec); cursor: pointer; }
.tog-sw {
  width: 32px; height: 17px; border-radius: 9px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  position: relative; transition: background 0.2s; cursor: pointer; flex-shrink: 0;
}
.tog-sw::after {
  content: ''; position: absolute; width: 11px; height: 11px;
  border-radius: 50%; background: var(--text-muted);
  top: 2px; left: 2px; transition: all 0.2s;
}
.tog-sw.on { background: var(--accent); border-color: var(--accent); }
.tog-sw.on::after { left: 17px; background: white; }
/* Stats */
#stats { font-size: 11px; color: var(--text-muted); text-align: center; }
#stats span { color: var(--accent-l); font-weight: 600; }
/* Legend */
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-sec); padding: 2px 0; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-cnt { margin-left: auto; color: var(--text-muted); font-size: 10px; }
/* Buttons */
.btn-row { display: flex; gap: 5px; }
.ctrl-btn {
  flex: 1; padding: 6px 6px; font-size: 11px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-sec); cursor: pointer; transition: all 0.15s;
}
.ctrl-btn:hover { background: var(--bg-card); color: var(--text-primary); border-color: var(--accent); }
/* ── Graph ── */
#graph-container { flex: 1; height: 100vh; background: var(--bg-primary); overflow: hidden; }
#graph-svg { width: 100%; height: 100%; display: block; }
/* ── Info Panel ── */
#info-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 355px;
  background: var(--bg-secondary); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  z-index: 50; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
#info-panel.open { transform: translateX(0); }
#info-inner { padding: 18px; }
#close-panel {
  float: right; background: var(--bg-tertiary); border: 1px solid var(--border);
  color: var(--text-muted); border-radius: 50%;
  width: 26px; height: 26px; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
}
#close-panel:hover { color: var(--text-primary); border-color: var(--accent); }
.i-badge {
  display: inline-block; font-size: 9.5px; font-weight: 700;
  padding: 2px 9px; border-radius: 99px; border: 1px solid;
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;
}
.i-title { font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
.i-meta { font-size: 11px; color: var(--text-sec); margin-bottom: 8px; line-height: 1.6; }
.i-meta .i-jrn { display: block; font-style: italic; }
.i-meta .i-yr  { font-weight: 600; color: var(--accent-l); }
.i-stars { font-size: 13px; margin-bottom: 10px; }
.i-stars .son  { color: #fbbf24; }
.i-stars .soff { color: var(--text-muted); }
.i-kws { margin-bottom: 12px; }
.kw-chip {
  display: inline-block; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: 99px;
  padding: 2px 8px; font-size: 10px; color: var(--text-sec); margin: 2px 2px;
}
.i-sec { margin-bottom: 11px; }
.i-sec h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
.i-sec p  { font-size: 11.5px; line-height: 1.75; color: var(--text-sec); }
.doi-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; color: var(--accent-l); text-decoration: none;
  padding: 6px 11px; background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: 6px; transition: all 0.15s; margin-top: 6px;
}
.doi-link:hover { background: var(--bg-card); border-color: var(--accent); }
.doi-none { font-size: 10.5px; color: var(--text-muted); font-style: italic; margin-top: 6px; display: block; }
/* ── Tooltip ── */
#tooltip {
  position: fixed; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px; font-size: 11.5px;
  pointer-events: none; max-width: 260px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6); z-index: 100;
  line-height: 1.5; display: none;
}
#tooltip .tt-sec  { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
#tooltip .tt-ttl  { font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
#tooltip .tt-meta { color: var(--text-muted); font-size: 10.5px; margin-bottom: 3px; }
#tooltip .son { color: #fbbf24; }
#tooltip .soff{ color: var(--text-muted); }
.node-label { pointer-events: none; font-family: 'Segoe UI', system-ui, sans-serif; }
</style>
</head>

<div id="info-panel">

</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
// ── Data ───────────────────────────────────────────────────────────────────
const raw = JSON.parse(document.getElementById('graph-data').textContent);
const allNodes = raw.nodes.map(d => ({...d}));
const allEdges = raw.edges.map(d => ({...d}));
const secLabels = raw.section_labels;

const COLOR = { CENTER:'#ffffff', A:'#4ade80', B:'#60a5fa', C:'#a78bfa', D:'#fb923c', E:'#f87171' };
const SEC_COUNTS = {A:11, B:14, C:9, D:1, E:14};
const SEC_DEFS = [
  {id:'A', ja:'GVI計算手法'},
  {id:'B', ja:'樹木配置最適化'},
  {id:'C', ja:'デジタルツイン'},
  {id:'D', ja:'景観品質評価'},
  {id:'E', ja:'日本語文献'},
];

function nodeR(d) { return d.id==='this-study' ? 26 : 6+(d.relevance-2)*4; }

// ── State ──────────────────────────────────────────────────────────────────
const st = {
  secs: new Set(['A','B','C','D','E']),
  yMin:1987, yMax:2026, minRel:2,
  kwEdges:false, query:'',
};

// ── SVG ─────────────────────────────────────────────────────────────────────
const svg = d3.select('#graph-svg');
const W = () => document.getElementById('graph-container').clientWidth;
const H = () => document.getElementById('graph-container').clientHeight;

const defs = svg.append('defs');
function addGlow(id, col, std) {
  const f = defs.append('filter').attr('id',id).attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
  f.append('feGaussianBlur').attr('stdDeviation',std).attr('result','b');
  f.append('feFlood').attr('flood-color',col).attr('flood-opacity','0.5').attr('result','c');
  f.append('feComposite').attr('in','c').attr('in2','b').attr('operator','in').attr('result','g');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','g');
  m.append('feMergeNode').attr('in','SourceGraphic');
}
addGlow('glow-center','#ffffff',7);
Object.entries(COLOR).forEach(([k,c]) => { if(k!=='CENTER') addGlow('glow-'+k,c,4); });

const zG    = svg.append('g').attr('id','zg');
const kwG   = zG.append('g');
const mainG = zG.append('g');
const nodeG = zG.append('g');
const labG  = zG.append('g');

const zoom = d3.zoom().scaleExtent([0.15,6]).on('zoom', e => zG.attr('transform',e.transform));
svg.call(zoom);

// ── Simulation ──────────────────────────────────────────────────────────────
const nodes = allNodes;
const edges = allEdges;

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d=>d.id)
    .distance(d => d.type==='main' ? 150-d.weight*13 : 190)
    .strength(d => d.type==='main' ? 0.32 : 0.04))
  .force('charge', d3.forceManyBody().strength(d => d.id==='this-study' ? -1100 : -140))
  .force('center', d3.forceCenter(W()/2, H()/2))
  .force('collide', d3.forceCollide().radius(d => nodeR(d)+5))
  .force('radial', d3.forceRadial(d => d.id==='this-study' ? 0 : 310, W()/2, H()/2).strength(0.07))
  .alphaDecay(0.018)
  .on('tick', tick);

// ── Edges ───────────────────────────────────────────────────────────────────
const mainLines = mainG.selectAll('line')
  .data(edges.filter(e=>e.type==='main'))
  .join('line')
  .attr('stroke', d => {
    const s = nodes.find(n => n.id===(d.source.id||d.source));
    return s ? COLOR[s.group]||'#888' : '#888';
  })
  .attr('stroke-width', d => d.weight*0.55)
  .attr('stroke-opacity', 0.6);

const kwLines = kwG.selectAll('line')
  .data(edges.filter(e=>e.type==='keyword'))
  .join('line')
  .attr('stroke','#94a3b8')
  .attr('stroke-width',0.7)
  .attr('stroke-dasharray','3 4')
  .attr('stroke-opacity',0);

// ── Nodes ────────────────────────────────────────────────────────────────────
const nodeGs = nodeG.selectAll('g')
  .data(nodes).join('g')
  .style('cursor','pointer')
  .call(d3.drag()
    .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
    .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

nodeGs.append('circle')
  .attr('r', d=>nodeR(d))
  .attr('fill', d=>COLOR[d.group]||'#888')
  .attr('fill-opacity', d=>d.id==='this-study'?1:0.85)
  .attr('filter', d=>d.id==='this-study'?'url(#glow-center)':null)
  .attr('stroke', d=>d.id==='this-study'?'#fff':'none')
  .attr('stroke-width', d=>d.id==='this-study'?2:0);

// Labels for center + high-relevance papers
const labData = nodes.filter(d=>d.id==='this-study'||d.relevance>=4);
const labSels = labG.selectAll('text')
  .data(labData).join('text')
  .attr('class','node-label')
  .attr('text-anchor','middle')
  .attr('fill', d=>d.id==='this-study'?'#fff':COLOR[d.group])
  .attr('font-size', d=>d.id==='this-study'?12:8.5)
  .attr('font-weight', d=>d.id==='this-study'?700:400)
  .attr('opacity', d=>d.id==='this-study'?1:0.8)
  .text(d=>{
    if(d.id==='this-study') return '本研究 / This Study';
    const t=d.title; return t.length>22?t.slice(0,20)+'…':t;
  });

// ── Tick ─────────────────────────────────────────────────────────────────────
function tick() {
  mainLines.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  kwLines.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeGs.attr('transform',d=>`translate(${d.x},${d.y})`);
  labSels.each(function(d){
    const n=nodes.find(n=>n.id===d.id);
    if(n) d3.select(this).attr('transform',`translate(${n.x},${n.y})`).attr('dy',-(nodeR(n)+5));
  });
}

// ── Tooltip ──────────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');
nodeGs
  .on('mouseover',(ev,d)=>{
    if(d.id==='this-study') return;
    const aShort = d.author.includes(',') ? d.author.split(',')[0].trim()+' et al.' : d.author;
    const sl = secLabels[d.group]||{en:d.group,ja:''};
    tip.innerHTML = `
      <div class="tt-sec" style="color:${COLOR[d.group]}">${sl.en} / ${sl.ja}</div>
      <div class="tt-ttl">${d.title}</div>
      <div class="tt-meta">${aShort} (${d.year})</div>
      <div><span class="son">${'&#9733;'.repeat(d.relevance)}</span><span class="soff">${'&#9733;'.repeat(5-d.relevance)}</span></div>`;
    tip.style.display='block';
    hlConnected(d);
  })
  .on('mousemove',ev=>{
    tip.style.left = Math.min(ev.clientX+14,window.innerWidth-275)+'px';
    tip.style.top  = Math.min(ev.clientY+14,window.innerHeight-110)+'px';
  })
  .on('mouseout',(ev,d)=>{ tip.style.display='none'; resetHl(); });

// ── Click ────────────────────────────────────────────────────────────────────
nodeGs.on('click',(ev,d)=>{
  ev.stopPropagation();
  showPanel(d);
});
svg.on('click',()=>{ document.getElementById('info-panel').classList.remove('open'); resetHl(); });
document.getElementById('close-panel').addEventListener('click',()=>{ document.getElementById('info-panel').classList.remove('open'); resetHl(); });

function showPanel(d) {
  const urlH = d.url
    ? `<a class="doi-link" href="${d.url}" target="_blank" rel="noopener">Open paper &#8599;</a>`
    : `<span class="doi-none">DOI / URL not available</span>`;
  const kws = d.keywords.map(k=>`<span class="kw-chip">${k}</span>`).join('');
  const sl = secLabels[d.group]||{en:d.group,ja:''};
  const badgeColor = COLOR[d.group]||'#888';
  const starsHtml = `<span class="son">${'&#9733;'.repeat(d.relevance)}</span><span class="soff">${'&#9733;'.repeat(5-d.relevance)}</span>`;

  let html = '';
  if (d.id !== 'this-study') {
    html = `
      <div class="i-badge" style="color:${badgeColor};border-color:${badgeColor};background:${badgeColor}1a">
        ${sl.en} / ${sl.ja}
      </div>
      <div class="i-title">${d.title}</div>
      <div class="i-meta">
        <span>${d.author}</span>
        <span class="i-jrn">${d.journal}</span>
        <span class="i-yr">${d.year}</span>
      </div>
      <div class="i-stars">${starsHtml}</div>
      <div class="i-kws">${kws}</div>
      <div class="i-sec"><h3>概要 / Summary</h3><p>${d.summary||'（記載なし）'}</p></div>
      <div class="i-sec"><h3>本研究との関連 / Relationship</h3><p>${d.relationship||'（記載なし）'}</p></div>
      <div>${urlH}</div>`;
  } else {
    html = `
      <div class="i-badge" style="color:#fff;border-color:#fff;background:#ffffff1a">本研究 / This Study</div>
      <div class="i-title">${d.title}</div>
      <div class="i-meta"><span>${d.author}</span><span class="i-jrn">${d.journal}</span><span class="i-yr">${d.year}</span></div>
      <div class="i-kws">${d.keywords.map(k=>`<span class="kw-chip">${k}</span>`).join('')}</div>
      <div class="i-sec"><h3>概要</h3><p>${d.summary}</p></div>`;
  }
  document.getElementById('info-content').innerHTML = html;
  document.getElementById('info-panel').classList.add('open');
}

// ── Highlight ─────────────────────────────────────────────────────────────────
function hlConnected(target) {
  const conn = new Set([target.id,'this-study']);
  edges.forEach(e=>{
    const s=e.source.id||e.source, t=e.target.id||e.target;
    if(s===target.id||t===target.id){conn.add(s);conn.add(t);}
  });
  nodeGs.attr('opacity',d=>conn.has(d.id)?1:0.1);
  labSels.attr('opacity',d=>conn.has(d.id)?1:0.04);
  mainLines.attr('stroke-opacity',d=>{
    const s=d.source.id,t=d.target.id;
    return(s===target.id||t===target.id)?0.9:0.03;
  });
}
function resetHl() { applyFilters(); }

// ── Filters ──────────────────────────────────────────────────────────────────
function visIds() {
  const v = new Set(['this-study']);
  nodes.forEach(n=>{
    if(n.id==='this-study') return;
    const ok = st.secs.has(n.group)
      && n.year>=st.yMin && n.year<=st.yMax
      && n.relevance>=st.minRel
      && (!st.query || [n.title,n.author,...n.keywords,n.summary].join(' ').toLowerCase().includes(st.query));
    if(ok) v.add(n.id);
  });
  return v;
}

function applyFilters() {
  const v = visIds();
  document.getElementById('vis-count').textContent = v.size-1;

  nodeGs.attr('opacity',d=>v.has(d.id)?1:0.06)
        .attr('pointer-events',d=>v.has(d.id)?'auto':'none');
  labSels.attr('opacity',d=>{
    if(d.id==='this-study') return 1;
    return v.has(d.id)?0.8:0.03;
  });
  mainLines.attr('stroke-opacity',d=>{
    const s=d.source.id||d.source, t=d.target.id||d.target;
    return (v.has(s)&&v.has(t))?0.6:0.03;
  });
  kwLines.attr('stroke-opacity',d=>{
    const s=d.source.id||d.source, t=d.target.id||d.target;
    return st.kwEdges&&v.has(s)&&v.has(t)?0.2:0;
  });
  // Search rings
  nodeGs.select('circle')
    .attr('stroke',d=>{
      if(d.id==='this-study') return '#fff';
      if(!st.query) return 'none';
      const m=[d.title,d.author,...d.keywords].join(' ').toLowerCase().includes(st.query);
      return m&&v.has(d.id)?'#fbbf24':'none';
    })
    .attr('stroke-width',d=>{
      if(d.id==='this-study') return 2;
      if(!st.query) return 0;
      const m=[d.title,d.author,...d.keywords].join(' ').toLowerCase().includes(st.query);
      return m&&v.has(d.id)?3:0;
    });
}

// ── Build sidebar ─────────────────────────────────────────────────────────────
// Sections
const secGrid = document.getElementById('section-filters');
SEC_DEFS.forEach(s=>{
  const btn=document.createElement('button');
  btn.className='sec-btn active'; btn.dataset.sec=s.id;
  btn.innerHTML=`<span class="dot" style="background:${COLOR[s.id]}"></span>${s.ja}`;
  btn.addEventListener('click',()=>{
    if(st.secs.has(s.id)){st.secs.delete(s.id);btn.classList.remove('active');btn.classList.add('inactive');}
    else{st.secs.add(s.id);btn.classList.remove('inactive');btn.classList.add('active');}
    applyFilters();
  });
  secGrid.appendChild(btn);
});

// Legend
const legDiv = document.getElementById('legend-secs');
SEC_DEFS.forEach(s=>{
  const item=document.createElement('div'); item.className='leg-item';
  item.innerHTML=`<span class="leg-dot" style="background:${COLOR[s.id]}"></span><span>${s.ja}</span><span class="leg-cnt">${SEC_COUNTS[s.id]}</span>`;
  legDiv.appendChild(item);
});

// Relevance buttons
const relRow = document.getElementById('rel-filters');
[2,3,4,5].forEach(r=>{
  const btn=document.createElement('button'); btn.className='rel-btn'+(r===2?' active':'');
  btn.textContent='★'.repeat(r); btn.dataset.rel=r;
  btn.addEventListener('click',()=>{
    st.minRel=r;
    relRow.querySelectorAll('.rel-btn').forEach(b=>b.classList.toggle('active',+b.dataset.rel===r));
    applyFilters();
  });
  relRow.appendChild(btn);
});

// Year slider
const yMinI=document.getElementById('year-min'), yMaxI=document.getElementById('year-max');
const rFill=document.getElementById('rng-fill');
function updRange(){
  const lo=(+yMinI.value-1987)/(2026-1987)*100;
  const hi=(+yMaxI.value-1987)/(2026-1987)*100;
  rFill.style.left=lo+'%'; rFill.style.width=(hi-lo)+'%';
  document.getElementById('yr-min-lbl').textContent=yMinI.value;
  document.getElementById('yr-max-lbl').textContent=yMaxI.value;
}
yMinI.addEventListener('input',()=>{ if(+yMinI.value>+yMaxI.value) yMinI.value=yMaxI.value; st.yMin=+yMinI.value; updRange(); applyFilters(); });
yMaxI.addEventListener('input',()=>{ if(+yMaxI.value<+yMinI.value) yMaxI.value=yMinI.value; st.yMax=+yMaxI.value; updRange(); applyFilters(); });
updRange();

// Keyword edges toggle
const kwTog=document.getElementById('kw-toggle');
kwTog.addEventListener('click',()=>{ st.kwEdges=!st.kwEdges; kwTog.classList.toggle('on',st.kwEdges); applyFilters(); });

// Search
document.getElementById('search-input').addEventListener('input',function(){ st.query=this.value.trim().toLowerCase(); applyFilters(); });

// Reset zoom
document.getElementById('btn-reset').addEventListener('click',()=>{
  svg.transition().duration(550).call(zoom.transform, d3.zoomIdentity.translate(W()/2,H()/2).scale(0.82).translate(-W()/2,-H()/2));
});

// Pause/Resume
let paused=false;
document.getElementById('btn-pause').addEventListener('click',function(){
  paused=!paused;
  if(paused){sim.stop();this.textContent='&#9654; Resume';}
  else{sim.restart();this.textContent='&#9646;&#9646; Pause';}
});

// Resize
window.addEventListener('resize',()=>{
  sim.force('center',d3.forceCenter(W()/2,H()/2))
     .force('radial',d3.forceRadial(d=>d.id==='this-study'?0:310,W()/2,H()/2).strength(0.07))
     .alpha(0.1).restart();
});

applyFilters();
</script>
