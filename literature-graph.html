<meta charset="UTF-8">

<title>Literature Graph – Tree Placement 3DGS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:   #080b12; --bg2: #101520; --bg3: #18202e; --bg4: #202840;
  --bd:   #263047; --tx:  #e2e8f0; --tx2: #8fa3bf; --tx3: #4a6080;
  --gold: #fbbf24; --acc: #7c3aed; --acc2:#a78bfa;
}
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--tx); display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
#sb { width:280px; min-width:280px; height:100vh; background:var(--bg2); border-right:1px solid var(--bd); overflow-y:auto; padding:15px 12px; display:flex; flex-direction:column; gap:11px; scrollbar-width:thin; scrollbar-color:var(--bd) transparent; flex-shrink:0; }
#sb::-webkit-scrollbar{width:3px}#sb::-webkit-scrollbar-thumb{background:var(--bd)}
.sb-hd h1 { font-size:14px; font-weight:700; margin-bottom:3px; }
.sb-hd p  { font-size:10.5px; color:var(--tx3); line-height:1.4; }
.lbl { font-size:10px; font-weight:700; color:var(--acc2); text-transform:uppercase; letter-spacing:.08em; padding-bottom:4px; border-bottom:1px solid var(--bd); margin-bottom:6px; }
.sw { position:relative; }
.sw input { width:100%; background:var(--bg3); border:1px solid var(--bd); border-radius:6px; color:var(--tx); font-size:11.5px; padding:7px 28px 7px 9px; outline:none; transition:border-color .2s; }
.sw input:focus { border-color:var(--acc); }
.sw input::placeholder { color:var(--tx3); }
.sw span { position:absolute; right:8px; top:50%; transform:translateY(-50%); color:var(--tx3); pointer-events:none; font-size:13px; }
.sg { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.sb-btn { border:1px solid var(--bd); background:var(--bg3); border-radius:5px; padding:5px 7px; cursor:pointer; font-size:10px; color:var(--tx2); text-align:left; transition:all .15s; }
.sb-btn .d { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.sb-btn.on { background:var(--bg4); color:var(--tx); border-color:var(--acc); }
.sb-btn.off { opacity:.38; }
.tg-row { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--tx2); cursor:pointer; margin-bottom:7px; }
.tg-row:last-child { margin-bottom:0; }
.tg { width:30px; height:16px; border-radius:8px; background:var(--bg3); border:1px solid var(--bd); position:relative; transition:background .2s; cursor:pointer; flex-shrink:0; }
.tg::after { content:''; position:absolute; width:10px; height:10px; border-radius:50%; background:var(--tx3); top:2px; left:2px; transition:all .2s; }
.tg.on { background:var(--acc); border-color:var(--acc); }
.tg.on::after { left:16px; background:#fff; }
#stats { font-size:10.5px; color:var(--tx3); text-align:center; line-height:1.7; }
#stats b { color:var(--acc2); }
.li { display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--tx2); padding:2px 0; }
.ld   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ld-sq{ width:8px; height:8px; border-radius:2px; border:1.5px solid; background:transparent; flex-shrink:0; }
.ld-hx{ width:9px; height:9px; clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); background:#64748b; flex-shrink:0; }
.lc { margin-left:auto; color:var(--tx3); font-size:9.5px; }
.br { display:flex; gap:5px; }
.cb { flex:1; padding:6px 5px; font-size:10.5px; background:var(--bg3); border:1px solid var(--bd); border-radius:5px; color:var(--tx2); cursor:pointer; transition:all .15s; }
.cb:hover { background:var(--bg4); color:var(--tx); border-color:var(--acc); }

/* Graph */
#gc { flex:1; height:100vh; background:var(--bg); overflow:hidden; }
svg { width:100%; height:100%; display:block; }

/* Right panel */
#rp { position:fixed; right:0; top:0; bottom:0; width:370px; background:var(--bg2); border-left:1px solid var(--bd); transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); z-index:50; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--bd) transparent; }
#rp::-webkit-scrollbar{width:3px}#rp::-webkit-scrollbar-thumb{background:var(--bd)}
#rp.open { transform:translateX(0); }
#rpi { padding:16px; }
#rp-close { float:right; background:var(--bg3); border:1px solid var(--bd); color:var(--tx3); border-radius:50%; width:24px; height:24px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
#rp-close:hover { color:var(--tx); border-color:var(--acc); }
.kw-hd .kw-name { font-size:18px; font-weight:700; line-height:1.3; margin-bottom:4px; }
.kw-hd .kw-meta { font-size:11px; color:var(--tx2); margin-bottom:4px; }
.kw-hd .kw-this { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:var(--gold); border:1px solid var(--gold); padding:2px 8px; border-radius:99px; margin-top:4px; }
.kw-hd .kw-mine { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:var(--gold); border:1px solid var(--gold); padding:2px 8px; border-radius:99px; margin-top:4px; background:rgba(251,191,36,.08); }
.pc-list { display:flex; flex-direction:column; gap:7px; margin-top:10px; }
.pc { background:var(--bg3); border:1px solid var(--bd); border-radius:8px; padding:10px 11px; cursor:pointer; transition:all .15s; }
.pc:hover { border-color:var(--acc); background:var(--bg4); }
.pc.my-pc { border-color:rgba(251,191,36,.4); }
.pc .pc-sec { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
.pc .pc-ttl { font-size:11.5px; font-weight:600; color:var(--tx); line-height:1.4; }
.pc .pc-meta { font-size:10px; color:var(--tx3); margin-top:3px; }
.back-btn { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--tx2); cursor:pointer; margin-bottom:12px; padding:5px 8px; background:var(--bg3); border:1px solid var(--bd); border-radius:5px; width:fit-content; }
.back-btn:hover { color:var(--tx); border-color:var(--acc); }
.pd-badge { display:inline-block; font-size:9.5px; font-weight:700; padding:2px 9px; border-radius:99px; border:1px solid; margin-bottom:9px; text-transform:uppercase; letter-spacing:.05em; }
.pd-mine { display:inline-flex; align-items:center; gap:5px; font-size:10px; color:var(--gold); border:1px solid var(--gold); padding:3px 10px; border-radius:99px; margin-bottom:9px; background:rgba(251,191,36,.08); }
.pd-ttl { font-size:14px; font-weight:700; line-height:1.4; margin-bottom:7px; }
.pd-meta { font-size:11px; color:var(--tx2); line-height:1.6; margin-bottom:8px; }
.pd-meta .pd-jrn { display:block; font-style:italic; }
.pd-meta .pd-yr  { font-weight:600; color:var(--acc2); }
.pd-kws { margin-bottom:11px; }
.kc { display:inline-block; background:var(--bg3); border:1px solid var(--bd); border-radius:99px; padding:2px 8px; font-size:9.5px; color:var(--tx2); margin:2px 2px; cursor:pointer; transition:all .12s; }
.kc:hover { border-color:var(--acc2); color:var(--tx); }
.kc.hl { border-color:var(--gold); color:var(--gold); }
.pd-sec { margin-bottom:10px; }
.pd-sec h3 { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--tx3); margin-bottom:3px; }
.pd-sec p  { font-size:11px; line-height:1.75; color:var(--tx2); }
.doi-a { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--acc2); text-decoration:none; padding:5px 10px; background:var(--bg3); border:1px solid var(--bd); border-radius:5px; transition:all .15s; margin-top:5px; }
.doi-a:hover { background:var(--bg4); border-color:var(--acc); }
.doi-n { font-size:10px; color:var(--tx3); font-style:italic; margin-top:5px; display:block; }

/* Tooltip */
#tt { position:fixed; background:var(--bg4); border:1px solid var(--bd); border-radius:7px; padding:8px 11px; font-size:11px; pointer-events:none; max-width:260px; box-shadow:0 6px 20px rgba(0,0,0,.6); z-index:100; display:none; line-height:1.5; }
#tt .tt-n { font-weight:700; color:var(--tx); margin-bottom:2px; font-size:12px; }
#tt .tt-c { color:var(--tx3); font-size:10px; }
#tt .tt-g { font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
.nl { pointer-events:none; font-family:'Segoe UI',system-ui,sans-serif; }
</style>
</head>

</div>

function paR(){ return 9; }   // uniform size for papers
function jnR(d){ return Math.max(14,Math.min(28,8+d.count*3)); }
function nodeR(d){ return d.type==='kw'?kwR(d):d.type==='journal'?jnR(d):paR(); }

function hexPoints(r){
  const pts=[];
  for(let i=0;i<6;i++){
    const a=Math.PI/180*(60*i-30);
    pts.push(`${(r*Math.cos(a)).toFixed(2)},${(r*Math.sin(a)).toFixed(2)}`);
  }
  return pts.join(' ');
}

// ── state ──────────────────────────────────────────────────────────────────
const st={
  secs:new Set(['A','B','C','D','F','G']),
  showRare:true, showPapers:true, showJournals:true, hlThis:true, q:''
};

// ── svg ────────────────────────────────────────────────────────────────────
const svg=d3.select('#gs');
const W=()=>document.getElementById('gc').clientWidth;
const H=()=>document.getElementById('gc').clientHeight;

const defs=svg.append('defs');
function addGlow(id,col,std){
  const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  f.append('feGaussianBlur').attr('stdDeviation',std).attr('result','b');
  f.append('feFlood').attr('flood-color',col).attr('flood-opacity','.55').attr('result','c');
  f.append('feComposite').attr('in','c').attr('in2','b').attr('operator','in').attr('result','g');
  const m=f.append('feMerge'); m.append('feMergeNode').attr('in','g'); m.append('feMergeNode').attr('in','SourceGraphic');
}
addGlow('glow-gold','#fbbf24',7);
Object.entries(COL).forEach(([k,c])=>addGlow('glow-'+k,c,3.5));
addGlow('glow-journal','#64748b',4);

const zG=svg.append('g');
const ePJ =zG.append('g').attr('class','layer-pj');
const ePK =zG.append('g').attr('class','layer-pk');
const nG  =zG.append('g').attr('class','layer-n');
const lG  =zG.append('g').attr('class','layer-lbl');

const zoom=d3.zoom().scaleExtent([0.05,12]).on('zoom',e=>zG.attr('transform',e.transform));
svg.call(zoom);

// ── rebuildGraph ───────────────────────────────────────────────────────────
let sim, eSel_pj, eSel_pk, nSel, lSel;

function visibleKwIds(){
  const q=st.q.toLowerCase();
  const v=new Set();
  KW_NODES.forEach(n=>{
    if(n.rare&&!st.showRare) return;
    const inSec=n.papers.some(pid=>{
      const p=PA_NODES.find(p=>p.id===pid);
      return p&&st.secs.has(p.group);
    });
    if(!inSec) return;
    if(q&&!n.label.toLowerCase().includes(q)) return;
    v.add(n.id);
  });
  return v;
}

function visiblePaperIds(){
  if(!st.showPapers) return new Set();
  const q=st.q.toLowerCase();
  const v=new Set();
  PA_NODES.forEach(p=>{
    if(!st.secs.has(p.group)) return;
    if(q){
      const ok=p.title.toLowerCase().includes(q)||
               p.author.toLowerCase().includes(q)||
               p.keywords.some(k=>k.toLowerCase().includes(q));
      if(!ok) return;
    }
    v.add(p.id);
  });
  return v;
}

function visibleJournalIds(vPa){
  if(!st.showJournals) return new Set();
  const v=new Set();
  JN_NODES.forEach(n=>{
    if(n.papers.some(pid=>vPa.has(pid))) v.add(n.id);
  });
  return v;
}

function rebuildGraph(){
  if(sim) sim.stop();
  nG.selectAll('*').remove();
  lG.selectAll('*').remove();
  ePK.selectAll('*').remove();
  ePJ.selectAll('*').remove();
  eKK.selectAll('*').remove();

  const vKw=visibleKwIds();
  const vPa=visiblePaperIds();
  const vJn=visibleJournalIds(vPa);

  const activeNodes=[
    ...KW_NODES.filter(d=>vKw.has(d.id)),
    ...PA_NODES.filter(d=>vPa.has(d.id)),
    ...JN_NODES.filter(d=>vJn.has(d.id)),
  ];
  const activeIds=new Set(activeNodes.map(d=>d.id));

  const activePK=PK_EDGES.filter(e=>activeIds.has(e.source.id||e.source)&&activeIds.has(e.target.id||e.target));
  const activePJ=PJ_EDGES.filter(e=>activeIds.has(e.source.id||e.source)&&activeIds.has(e.target.id||e.target));

  document.getElementById('stats').innerHTML=
    `KW <b>${vKw.size}</b> / 論文 <b>${vPa.size}</b> / ジャーナル <b>${vJn.size}</b>`;

  // ── edges ─────────────────────────────────────────────────────────────
  eSel_pj=ePJ.selectAll('line').data(activePJ).join('line')
    .attr('stroke','#64748b').attr('stroke-opacity',0.25).attr('stroke-width',0.8)
    .attr('stroke-dasharray','2 4');

  eSel_pk=ePK.selectAll('line').data(activePK).join('line')
    .attr('stroke-opacity',0.25).attr('stroke-width',0.85)
    .attr('stroke',e=>{
      const pid=e.source.id||e.source;
      const p=PA_NODES.find(p=>p.id===pid);
      return p?COL[p.group]||COL.MIX:'#334466';
    });

  // ── nodes ──────────────────────────────────────────────────────────────
  nSel=nG.selectAll('g').data(activeNodes,d=>d.id).join('g')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',  (e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

  // keyword gold halo
  nSel.filter(d=>d.type==='kw'&&d.thisStudy)
    .append('circle').attr('r',d=>kwR(d)+5).attr('fill','none')
    .attr('stroke','#fbbf24').attr('stroke-width',1.5)
    .attr('stroke-opacity',0.7).attr('stroke-dasharray','4 3');

  // keyword body
  nSel.filter(d=>d.type==='kw')
    .append('circle').attr('r',d=>kwR(d))
    .attr('fill',d=>d.color).attr('fill-opacity',d=>d.rare?0.35:0.85)
    .attr('filter',d=>d.thisStudy?'url(#glow-gold)':d.rare?null:`url(#glow-${d.section})`);

  // paper: diamond (rotated rect)
  const paG=nSel.filter(d=>d.type==='paper');
  const paR0=9;
  paG.append('rect')
    .attr('width',paR0*1.7).attr('height',paR0*1.7)
    .attr('x',-paR0*0.85).attr('y',-paR0*0.85)
    .attr('transform','rotate(45)')
    .attr('fill',d=>d.myPaper?'#fbbf24':COL[d.group]||COL.MIX)
    .attr('fill-opacity',d=>d.myPaper?0.28:0.22)
    .attr('stroke',d=>d.myPaper?'#fbbf24':COL[d.group]||COL.MIX)
    .attr('stroke-width',d=>d.myPaper?2.5:1.5)
    .attr('stroke-opacity',d=>d.myPaper?1:0.85)
    .attr('filter',d=>d.myPaper?'url(#glow-gold)':`url(#glow-${d.group})`);

  // journal: hexagon
  nSel.filter(d=>d.type==='journal')
    .append('polygon')
    .attr('points',d=>hexPoints(jnR(d)))
    .attr('fill','#1e293b').attr('fill-opacity',0.85)
    .attr('stroke','#64748b').attr('stroke-width',1.5)
    .attr('filter','url(#glow-journal)');

  // ── labels ─────────────────────────────────────────────────────────────
  lSel=lG.selectAll('text').data(activeNodes,d=>d.id).join('text')
    .attr('class','nl').attr('text-anchor','middle')
    .attr('fill',d=>{
      if(d.type==='paper') return d.myPaper?'#fbbf24':COL[d.group]||COL.MIX;
      if(d.type==='journal') return '#94a3b8';
      return d.thisStudy?'#fbbf24':d.color;
    })
    .attr('font-size',d=>{
      if(d.type==='paper') return 7.5;
      if(d.type==='journal') return d.count>=5?9:8;
      return d.thisStudy?12:d.rare?7:d.count>=5?11:9.5;
    })
    .attr('font-weight',d=>{
      if(d.type==='paper') return d.myPaper?700:400;
      if(d.type==='journal') return 500;
      return d.thisStudy||d.count>=4?700:400;
    })
    .attr('opacity',d=>{
      if(d.type==='paper') return d.myPaper?0.9:0.65;
      if(d.type==='journal') return 0.8;
      return d.rare?0.65:0.95;
    })
    .text(d=>{
      if(d.type==='paper'){
        const t=d.title; return t.length>22?t.slice(0,20)+'…':t;
      }
      if(d.type==='journal'){
        return d.label.length>24?d.label.slice(0,22)+'…':d.label;
      }
      return d.label;
    });

  // ── hover ──────────────────────────────────────────────────────────────
  const tt=document.getElementById('tt');
  nSel.on('mouseover',(ev,d)=>{
    if(d.type==='kw'){
      const sl=SEC_LBL[d.section]||{en:d.section,ja:''};
      tt.innerHTML=`
        <div class="tt-g" style="color:${d.thisStudy?'#fbbf24':d.color}">${d.thisStudy?'★ 私の研究KW':sl.en+' / '+sl.ja}</div>
        <div class="tt-n">${d.label}</div>
        <div class="tt-c">${d.count}本の論文で使用 · クリックで論文一覧</div>`;
    } else if(d.type==='paper'){
      const sl=SEC_LBL[d.group]||{en:d.group,ja:d.group};
      tt.innerHTML=`
        <div class="tt-g" style="color:${d.myPaper?'#fbbf24':COL[d.group]||'#888'}">${d.myPaper?'★ 著者の研究':sl.en+' / '+sl.ja}</div>
        <div class="tt-n">[${d.no}] ${d.title}</div>
        <div class="tt-c">${shortAuthor(d.author)} (${d.year})</div>`;
    } else {
      tt.innerHTML=`
        <div class="tt-g" style="color:#64748b">ジャーナル</div>
        <div class="tt-n">${d.label}</div>
        <div class="tt-c">${d.count}本掲載 · クリックで論文一覧</div>`;
    }
    tt.style.display='block';
    hlNode(d);
  })
  .on('mousemove',ev=>{
    tt.style.left=Math.min(ev.clientX+13,window.innerWidth-280)+'px';
    tt.style.top =Math.min(ev.clientY+13,window.innerHeight-100)+'px';
  })
  .on('mouseout',()=>{ tt.style.display='none'; resetHl(); });

  nSel.on('click',(ev,d)=>{
    ev.stopPropagation();
    if(d.type==='kw') showKwPanel(d);
    else if(d.type==='journal') showJournalPanel(d);
    else showPaperDetail(d.id, null);
  });
  svg.on('click',()=>{ closePanel(); resetHl(); });
  document.getElementById('rp-close').onclick=()=>{ closePanel(); resetHl(); };

  // ── simulation ─────────────────────────────────────────────────────────
  const simEdges=[...activePK, ...activePJ];
  sim=d3.forceSimulation(activeNodes)
    .force('link',d3.forceLink(simEdges).id(d=>d.id)
      .distance(e=>{
        if(e.type==='kk') return 80;
        if(e.type==='pj') return 55;
        const s=activeNodes.find(n=>n.id===(e.source.id||e.source));
        const t=activeNodes.find(n=>n.id===(e.target.id||e.target));
        return (s?nodeR(s):9)+(t?nodeR(t):9)+20;
      })
      .strength(e=>e.type==='kk'?0.05:e.type==='pj'?0.15:0.22))
    .force('charge',d3.forceManyBody().strength(d=>{
      if(d.type==='kw') return d.rare?-55:-(kwR(d)**2)*0.5;
      if(d.type==='journal') return -(jnR(d)**2)*0.4;
      return -50;
    }))
    .force('center',d3.forceCenter(W()/2,H()/2).strength(0.04))
    .force('collide',d3.forceCollide().radius(d=>nodeR(d)+(d.type==='kw'?7:d.type==='journal'?9:5)).strength(0.7))
    .alphaDecay(0.013)
    .on('tick',tick);

  applyKKVis();
}

// ── tick ───────────────────────────────────────────────────────────────────
function tick(){
  eSel_pk.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  eSel_pj.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  lSel.each(function(d){
    const n=nSel.data().find(n=>n.id===d.id);
    if(n){
      let dy;
      if(n.type==='kw')      dy=-(kwR(n)+6);
      else if(n.type==='journal') dy=jnR(n)+11;
      else                   dy=paR()+11;
      d3.select(this).attr('transform',`translate(${n.x},${n.y})`).attr('dy',dy);
    }
  });
}

// ── highlight ─────────────────────────────────────────────────────────────
function hlNode(target){
  const conn=new Set([target.id]);
  PK_EDGES.forEach(e=>{
    const s=e.source.id||e.source, t=e.target.id||e.target;
    if(s===target.id) conn.add(t);
    if(t===target.id) conn.add(s);
  });
  PJ_EDGES.forEach(e=>{
    const s=e.source.id||e.source, t=e.target.id||e.target;
    if(s===target.id) conn.add(t);
    if(t===target.id) conn.add(s);
  });
  nSel.attr('opacity',d=>conn.has(d.id)?1:0.07);
  lSel.attr('opacity',d=>conn.has(d.id)?(d.type==='paper'?(d.myPaper?0.9:0.65):d.type==='journal'?0.8:d.rare?0.65:0.95):0.03);
  eSel_pk.attr('stroke-opacity',e=>{
    const s=e.source.id,t=e.target.id;
    return(s===target.id||t===target.id)?0.75:0.02;
  }).attr('stroke-width',e=>{
    const s=e.source.id,t=e.target.id;
    return(s===target.id||t===target.id)?1.8:0.5;
  });
  eSel_pj.attr('stroke-opacity',e=>{
    const s=e.source.id,t=e.target.id;
    return(s===target.id||t===target.id)?0.65:0.02;
  });
}

function resetHl(){
  if(!nSel) return;
  nSel.attr('opacity',1);
  lSel.attr('opacity',d=>d.type==='paper'?(d.myPaper?0.9:0.65):d.type==='journal'?0.8:d.rare?0.65:0.95);
  eSel_pk.attr('stroke-opacity',0.25).attr('stroke-width',0.85);
  eSel_pj.attr('stroke-opacity',0.25);
}

// ── panels ─────────────────────────────────────────────────────────────────
function closePanel(){ document.getElementById('rp').classList.remove('open'); }

function showKwPanel(d){
  const papers=PA_NODES.filter(p=>p.keywords.includes(d.label))
    .sort((a,b)=>(b.myPaper-a.myPaper)||a.year-b.year);
  const sl=SEC_LBL[d.section]||{en:d.section,ja:''};
  const thisTag=d.thisStudy?`<div class="kw-this">★ 私の研究キーワード</div>`:'';
  const cards=papers.map(p=>`
    <div class="pc${p.myPaper?' my-pc':''}" onclick="showPaperDetail('${p.id}','${d.label}')">
      <div class="pc-sec" style="color:${p.myPaper?'#fbbf24':COL[p.group]||'#888'}">${p.myPaper?'著者の研究':(SEC_LBL[p.group]||{ja:p.group}).ja}</div>
      <div class="pc-ttl">[${p.no}] ${p.title}</div>
      <div class="pc-meta">${shortAuthor(p.author)} (${p.year})</div>
    </div>`).join('');
  document.getElementById('rp-content').innerHTML=`
    <div class="kw-hd">
      <div class="kw-name" style="color:${d.thisStudy?'#fbbf24':d.color}">${d.label}</div>
      <div class="kw-meta">${d.count}本の論文で使用 &nbsp;·&nbsp; ${sl.ja}</div>
      ${thisTag}
    </div>
    <div class="pc-list">${cards}</div>`;
  document.getElementById('rp').classList.add('open');
}

function showJournalPanel(d){
  const papers=PA_NODES.filter(p=>d.papers.includes(p.id))
    .sort((a,b)=>(b.myPaper-a.myPaper)||a.year-b.year);
  const cards=papers.map(p=>`
    <div class="pc${p.myPaper?' my-pc':''}" onclick="showPaperDetail('${p.id}',null)">
      <div class="pc-sec" style="color:${p.myPaper?'#fbbf24':COL[p.group]||'#888'}">${p.myPaper?'著者の研究':(SEC_LBL[p.group]||{ja:p.group}).ja}</div>
      <div class="pc-ttl">[${p.no}] ${p.title}</div>
      <div class="pc-meta">${shortAuthor(p.author)} (${p.year})</div>
    </div>`).join('');
  document.getElementById('rp-content').innerHTML=`
    <div class="kw-hd">
      <div class="kw-name" style="color:#94a3b8">⬡ ${d.label}</div>
      <div class="kw-meta">${d.count}本掲載</div>
    </div>
    <div class="pc-list">${cards}</div>`;
  document.getElementById('rp').classList.add('open');
}

function showPaperDetail(paperId, fromKw){
  const p=PA_NODES.find(p=>p.id===paperId);
  if(!p) return;
  const col=p.myPaper?'#fbbf24':COL[p.group]||'#888';
  const sl=SEC_LBL[p.group]||{en:p.group,ja:p.group};
  const urlH=p.url?`<a class="doi-a" href="${p.url}" target="_blank" rel="noopener">Open paper &#8599;</a>`:`<span class="doi-n">URL not available</span>`;
  const kws=p.keywords.map(k=>`<span class="kc${k===fromKw?' hl':''}" onclick="clickKwChip('${k.replace(/'/g,"\'")}',event)">${k}</span>`).join('');
  const backBtn=fromKw?`<div class="back-btn" onclick="backToKw('${fromKw.replace(/'/g,"\'")}')">&#8592; ${fromKw}</div>`:'';
  const badgeHtml=p.myPaper
    ?`<div class="pd-mine">★ 著者の研究</div>`
    :`<div class="pd-badge" style="color:${col};border-color:${col};background:${col}1a">${sl.en} / ${sl.ja}</div>`;
  document.getElementById('rp-content').innerHTML=`
    ${backBtn}
    ${badgeHtml}
    <div class="pd-ttl" style="color:${p.myPaper?'#fbbf24':'var(--tx)'}">[${p.no}] ${p.title}</div>
    <div class="pd-meta">
      <span>${p.author}</span>
      <span class="pd-jrn">${p.journal}</span>
      <span class="pd-yr">${p.year}</span>
    </div>
    <div class="pd-kws">${kws}</div>
    <div class="pd-sec"><h3>概要 / Summary</h3><p>${p.summary||'（記載なし）'}</p></div>
    <div class="pd-sec"><h3>私の研究との関係性</h3><p>${p.relationship||'（記載なし）'}</p></div>
    <div>${urlH}</div>`;
  document.getElementById('rp').classList.add('open');
}

function backToKw(kwLabel){
  const d=KW_NODES.find(n=>n.label===kwLabel);
  if(d) showKwPanel(d);
}
function clickKwChip(kwLabel,ev){
  ev.stopPropagation();
  const d=KW_NODES.find(n=>n.label===kwLabel);
  if(d) showKwPanel(d);
}
window.showPaperDetail=showPaperDetail;
window.backToKw=backToKw;
window.clickKwChip=clickKwChip;

function shortAuthor(a){ return a.includes(',')?a.split(',')[0].trim()+' et al.':a; }

// ── sidebar controls ──────────────────────────────────────────────────────
const secGrid=document.getElementById('sec-btns');
SEC_DEF.forEach(s=>{
  const btn=document.createElement('button');
  btn.className='sb-btn on'; btn.dataset.sec=s.id;
  const dot=s.id==='G'?`<span class="d" style="background:#fbbf24;border-radius:2px"></span>`
                      :`<span class="d" style="background:${COL[s.id]}"></span>`;
  btn.innerHTML=dot+s.ja;
  btn.addEventListener('click',()=>{
    if(st.secs.has(s.id)){st.secs.delete(s.id);btn.classList.replace('on','off');}
    else{st.secs.add(s.id);btn.classList.replace('off','on');}
    rebuildGraph();
  });
  secGrid.appendChild(btn);
});

// toggles
function makeToggle(id,key,rebuild){
  const el=document.getElementById(id);
  el.classList.toggle('on',st[key]);
  el.addEventListener('click',()=>{ st[key]=!st[key]; el.classList.toggle('on',st[key]); rebuild?rebuildGraph():applyKKVis(); });
}
makeToggle('tg-papers','showPapers',true);
makeToggle('tg-rare','showRare',true);
makeToggle('tg-journals','showJournals',true);

const tgThis=document.getElementById('tg-this');
tgThis.classList.add('on');
tgThis.addEventListener('click',()=>{
  st.hlThis=!st.hlThis; tgThis.classList.toggle('on',st.hlThis);
  nSel&&nSel.selectAll('circle:first-child').attr('stroke-opacity',d=>st.hlThis&&d.thisStudy?0.7:0);
});

// search
document.getElementById('q').addEventListener('input',function(){
  st.q=this.value.trim().toLowerCase(); rebuildGraph();
});

// reset / pause
document.getElementById('btn-rst').addEventListener('click',()=>{
  svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity);
});
let paused=false;
document.getElementById('btn-ps').addEventListener('click',function(){
  paused=!paused;
  if(paused){sim&&sim.stop();this.textContent='▶ Resume';}
  else{sim&&sim.restart();this.textContent='⏸ Pause';}
});
window.addEventListener('resize',()=>{
  if(sim) sim.force('center',d3.forceCenter(W()/2,H()/2)).alpha(0.1).restart();
});

// ── init ───────────────────────────────────────────────────────────────────
rebuildGraph();
</script>
